name: Gera imagem diária

# Roda todo dia às 20:00 BRT (23:00 UTC) e também por disparo manual.
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

# Precisa escrever no repo pra commitar a imagem.
permissions:
  contents: write

concurrency:
  group: gera-imagem
  cancel-in-progress: false

jobs:
  gerar:
    runs-on: ubuntu-latest
    env:
      # Fuso pra data/hora da mensagem de commit sair em BRT.
      TZ: America/Sao_Paulo
      # Config não-sensível do bot (edite à vontade).
      TARGET_TEAM: ASSOCIAÇÃO SOROCABANA DE FUTSAL
      TARGET_TEAM_DISPLAY: A.S.F. MAGNUS
      EVENT_URL: https://eventos.admfutsal.com.br/evento/908
      # Segredos do Telegram (Settings → Secrets and variables → Actions).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Histórico completo para o rebase do push ser confiável (sem shallow).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependências de sistema do canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Instala dependências do projeto
        run: npm ci

      - name: Gera a imagem
        run: node enviar.js

      - name: Commita a imagem no repo
        # Roda mesmo se "Gera a imagem" falhar no envio ao Telegram, pra imagem
        # do dia ser commitada; o job ainda termina vermelho por causa da falha.
        if: ${{ !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated-images/
          if git diff --staged --quiet; then
            echo "Nenhuma imagem nova pra commitar."
            exit 0
          fi
          git commit -m "chore: imagem diária $(date '+%Y-%m-%d %H:%M')"
          # O remoto pode ter avançado (push externo ou outro run) entre o
          # checkout e o push. Agora a imagem tem nome fixo (classificacao.png),
          # então rebaseamos com -X theirs: se houver conflito no PNG, a imagem
          # recém-gerada (a mais recente) sempre vence.
          for tentativa in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push OK na tentativa $tentativa."
              exit 0
            fi
            echo "Push rejeitado; rebase sobre origin/main e nova tentativa ($tentativa)..."
            git pull --rebase -X theirs origin main
          done
          echo "Falha ao empurrar a imagem após 5 tentativas." >&2
          exit 1
